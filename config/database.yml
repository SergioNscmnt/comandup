default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME", "comand_up") %>
  password: <%= ENV.fetch("DB_PASSWORD", "comand_up_password") %>
  host: <%= ENV.fetch("DB_HOST", "db") %>
  port: <%= ENV.fetch("DB_PORT", 3306) %>
  variables:
    sql_mode: STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_DEVELOPMENT", "comand_up_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_TEST", "comand_up_test") %>
  host: <%= ENV.fetch("DB_HOST_TEST", "127.0.0.1") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_PRODUCTION", "comand_up_production") %>
